[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
markers =
    unit: Unit tests
    integration: Integration tests
    replay: Replay verification tests
    recovery: Crash and recovery tests
    contract: Contract freezing tests
    sandbox: Sandbox security tests
    governance: Governance stress tests
    drift: Drift injection tests
    longrun: Long-run stability tests
    stress: Stress tests
